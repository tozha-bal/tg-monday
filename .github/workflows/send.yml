name: Send Monday Message
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install telethon apscheduler pytz
      - run: python send.py
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION: ${{ secrets.SESSION }}
          GROUP: ${{ secrets.GROUP }}
          MESSAGE: ${{ secrets.MESSAGE }}
